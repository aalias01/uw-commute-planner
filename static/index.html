<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UW Commute Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      padding: 24px 16px;
      max-width: 560px;
      margin: 0 auto;
    }

    h1   { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 16px; }

    /* mode tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab {
      padding: 7px 18px; border-radius: 999px;
      border: 1.5px solid #ccc; background: white;
      font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .tab.active  { background: #1a6b4a; color: white; border-color: #1a6b4a; }
    .tab:hover:not(.active) { border-color: #888; }

    /* desc + refresh row */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 10px;
    }
    .desc    { font-size: 12px; color: #666; flex: 1; line-height: 1.4; }
    .refresh {
      font-size: 12px; padding: 5px 14px; border-radius: 999px;
      border: 1px solid #ccc; background: white; cursor: pointer; white-space: nowrap;
    }
    .refresh:hover { border-color: #888; }

    /* connection card */
    .card {
      background: white; border-radius: 12px;
      border: 1px solid #e0e0e0; padding: 14px 16px;
      margin-bottom: 10px;
    }
    .card.top { border-color: #1a6b4a; border-width: 2px; }

    .card-header {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 4px;
    }
    .leave-lbl  { font-size: 10px; font-weight: 600; color: #888; letter-spacing: 0.06em; text-transform: uppercase; }
    .leave-time { font-size: 28px; font-weight: 700; color: #111; }
    .badge {
      font-size: 10px; padding: 2px 8px; border-radius: 999px;
      font-weight: 500; margin-left: 8px;
    }
    .badge-live  { background: #e1f5ee; color: #085041; }
    .badge-sched { background: #f0f0f0; color: #888; }
    .countdown   { font-size: 13px; font-weight: 500; margin-bottom: 12px; color: #1a6b4a; }
    .countdown.now   { color: #c0392b; }
    .alt-lbl { font-size: 11px; color: #aaa; margin-bottom: 6px; }

    /* steps table */
    .steps { width: 100%; border-collapse: collapse; }
    .steps thead th {
      font-size: 10px; font-weight: 600; color: #aaa;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 0 0 6px; border-bottom: 1px solid #f0f0f0;
    }
    .steps thead th:last-child,
    .steps thead th:nth-last-child(2) { text-align: right; }

    .steps tbody tr { border-bottom: 1px solid #f7f7f7; }
    .steps tbody tr:last-child { border-bottom: none; }
    .steps tbody td { padding: 7px 0; vertical-align: middle; font-size: 13px; }

    .step-icon {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .icon-walk { background: #eaf3de; }
    .icon-bus  { background: #e6f1fb; }
    .icon-rail { background: #eeedfe; }

    .step-label { font-size: 13px; color: #222; padding-left: 10px; }
    .step-sub   { font-size: 11px; color: #999; margin-top: 1px; }
    .step-time  { font-size: 13px; font-weight: 500; color: #444; text-align: right; white-space: nowrap; padding-left: 10px; }
    .step-time.dim { color: #aaa; }

    /* misc */
    .error {
      background: #fff0f0; border: 1px solid #f09595;
      border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #a32d2d;
    }
    .warn {
      background: #fff8e1; border: 1px solid #f0c040;
      border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #7a5f00;
    }
    .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>

  <h1>🚌 UW Commute Planner</h1>
  <p class="sub" id="clock">—</p>

  <div class="tabs" id="tabs"></div>

  <div class="toolbar">
    <span class="desc" id="desc"></span>
    <button class="refresh" onclick="load()">↻ Refresh</button>
  </div>

  <div id="out"><div class="loading">Fetching live data…</div></div>

<script>
  let mode = 1;

  // clock
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', second:'2-digit'});
  }
  setInterval(tick, 1000); tick();

  // modes
  async function initModes() {
    const d = await fetch('/api/modes').then(r => r.json());
    const el = document.getElementById('tabs');
    d.modes.forEach(m => {
      const b = document.createElement('button');
      b.className = 'tab' + (m.id === mode ? ' active' : '');
      b.textContent = m.name;
      b.onclick = () => {
        mode = m.id;
        el.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        load();
      };
      el.appendChild(b);
    });
  }

  // icons
  const ICONS = { walk: '🚶', bus: '🚌', rail: '🚇' };
  const ICON_CLASS = { walk: 'icon-walk', bus: 'icon-bus', rail: 'icon-rail' };

  function renderCard(c, first) {
    const urgent = c.minutes_until <= 5;
    const countText = c.minutes_until === 0 ? 'Leave NOW' : `Leave in ${c.minutes_until} min`;
    const badge = c.is_realtime
      ? '<span class="badge badge-live">Live</span>'
      : '<span class="badge badge-sched">Scheduled</span>';

    // build step rows
    let rows = '';
    c.steps.forEach(s => {
      const icon = `<div class="step-icon ${ICON_CLASS[s.icon]}">${ICONS[s.icon]}</div>`;
      const depart = s.depart ? `<td class="step-time">${s.depart}</td>` : `<td class="step-time dim">—</td>`;
      const arrive = s.arrive ? `<td class="step-time">${s.arrive}</td>` : `<td class="step-time dim">—</td>`;
      rows += `
        <tr>
          <td style="width:30px">${icon}</td>
          <td class="step-label">${s.label}</td>
          ${depart}
          ${arrive}
        </tr>`;
    });

    return `
      <div class="card${first ? ' top' : ''}">
        ${first ? '' : '<div class="alt-lbl">Alternative</div>'}
        <div class="leave-lbl">Leave Odegaard</div>
        <div class="leave-time">${c.leave_odegaard}${badge}</div>
        <div class="countdown${urgent ? ' now' : ''}">${countText}</div>
        <table class="steps">
          <thead>
            <tr>
              <th></th>
              <th style="text-align:left"></th>
              <th>Depart</th>
              <th>Arrive</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  async function load() {
    document.getElementById('out').innerHTML = '<div class="loading">Fetching live data…</div>';
    try {
      const d = await fetch(`/api/connections?mode=${mode}`).then(r => r.json());

      if (d.error === 'rate_limit') {
        document.getElementById('out').innerHTML =
          '<div class="warn">⏱ Rate limited. Retrying in 10 seconds…</div>';
        setTimeout(load, 10000);
        return;
      }
      if (d.error) {
        document.getElementById('out').innerHTML = `<div class="error">${d.error}</div>`;
        return;
      }

      document.getElementById('desc').textContent = d.mode_description;
      document.getElementById('out').innerHTML =
        d.connections.map((c, i) => renderCard(c, i === 0)).join('');

    } catch(e) {
      document.getElementById('out').innerHTML =
        `<div class="error">Could not reach server. Is the app running?</div>`;
    }
  }

  setInterval(load, 60000);
  initModes().then(load);
</script>
</body>
</html>
